<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Nothing to see here yet.</title>
        <link class="stage1" rel="stylesheet" href="assets/css/main.css">
        <link rel="shortcut icon" href="assets/images/favicon.ico" />
        <script class="stage1" src="assets/js/jquery-4.0.0.js"></script>
    </head>
    <body>
        <noscript><span style="color:black;font-size:48px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px;height:fit-content;min-width:fit-content;width:fit-content;">JavaScript is disabled in your browser. Please enable JavaScript to view this site.</span>
        </noscript>

        <span id="message" class="hide">Nothing to see here yet.</span>
        <span id="loader" class="hide">Loading</span>
        <script class="stage1">
            const loader = document.getElementById("loader");
            if (loader) {
                loader.classList.remove("hide");

                const updateRateMs = 500;
                let loaderInterval = null;

                const stepLoadingAnimation = () => {
                    if (!loader || document.querySelector('fa-body') !== null) { 
                        if (typeof loaderInterval === "number") {
                            clearInterval(loaderInterval);
                            loaderInterval = null;
                        }
                        loader?.remove();
                        document.querySelector('script[class="stage1"]')?.remove();
                        return;
                    }

                    if (loader.textContent.endsWith("...")) {
                        loader.textContent = "Loading";
                    } else {
                        loader.textContent += ".";
                    }
                };
                loaderInterval = setInterval(() => { stepLoadingAnimation(); }, updateRateMs);
            }
        </script>

    </body>
</html>
